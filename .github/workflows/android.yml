name: Android

on:
  push:
    branches: [main, master]
    tags: ["v*", "[0-9]*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Test and build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-36" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test and build
        run: ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: blockdrop-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Decode upload keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "ANDROID_UPLOAD_KEYSTORE_BASE64 is required for tag release builds"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/android-signing"
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/upload-key.jks"

      - name: Build signed release APK and bundle
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_UPLOAD_KEYSTORE_PATH: ${{ runner.temp }}/android-signing/upload-key.jks
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Prepare release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/blockdrop-${GITHUB_REF_NAME}.apk"
          cp app/build/outputs/bundle/release/app-release.aab "release/blockdrop-${GITHUB_REF_NAME}.aab"

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: blockdrop-${{ github.ref_name }}-release
          path: release/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
