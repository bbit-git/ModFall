name: Android

on:
  push:
    branches: [main, master]
    tags: ["v*", "[0-9]*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Test and build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "platforms;android-36" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test and build
        run: ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: blockdrop-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk "release/blockdrop-${GITHUB_REF_NAME}-unsigned.apk"

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: blockdrop-${{ github.ref_name }}-unsigned-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
